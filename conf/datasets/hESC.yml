# ============================================================
# hESC  —  Human Embryonic Stem Cells  (TRAIN)
# RNA: 758 cells, 17 735 genes  (Beeline benchmark)
# Gold: hESC ChIP-seq network
# Species: human  /  Genome: hg38
# GEO context: H1 hESC differentiating to definitive endoderm
# ============================================================

run_id: hESC_train
artifact_root: artifacts
seed: 42
eval_track: track1_no_literature
split_id: hESC_fold
disable_priors: false
use_ortholog_lookup: true

# ------------------------------------------------------------------
# Multimodal acquisition
# Run the command below once, then uncomment multimodal_manifest.
#
# conda run --live-stream -n om-agent python3 scripts/acquire_multimodal_data.py \
#   --expr        Data/sc-RNA-seq/hESC/ExpressionData.csv \
#   --species     human \
#   --genome      hg38 \
#   --cell-type   "embryonic stem cell" \
#   --cell-line   "H1" \
#   --lineage     "pluripotent" \
#   --cell-context \
#     "Human Embryonic Stem Cells (hESC): H1 hESC differentiating to definitive endoderm (DE) \
#      measured at 0h, 12h, 24h, 36h, 72h and 96h" \
#   --gold-network  Data/sc-RNA-seq/hESC/hESC-ChIP-seq-network.csv \
#   --out-manifest  artifacts/acquire/hESC/multimodal_manifest.json \
#   --strict \
#   --jaspar-release 2026 \
#   --use-semantic-slm
#
# multimodal_manifest: artifacts/acquire/hESC/multimodal_manifest.json
# ------------------------------------------------------------------

dataset:
  mode: beeline_csv
  dataset_id: hESC
  species: human
  expression_path: Data/sc-RNA-seq/hESC/ExpressionData.csv
  gold_edges_path: Data/sc-RNA-seq/hESC/hESC-ChIP-seq-network.csv
  tf_file: Data/sc-RNA-seq/hESC/TFs.csv
  modalities: ["scrna"]

cell_context:
  use_scanpy: false
  cell_type: "embryonic stem cell"

candidates:
  min_pearson: 0.1
  max_edges_per_tf: 50

train:
  frac: 0.8

calibration:
  temperature: 1.0

decode:
  max_regulators_per_target: 10
  min_confidence: 0.0

scoring:
  checkpoint: artifacts/eager/eager.pt
  device: cpu
