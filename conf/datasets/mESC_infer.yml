# ============================================================
# mESC  —  Mouse Embryonic Stem Cells  (INFER / HELD-OUT)
# RNA: Beeline benchmark
# Gold: mESC ChIP-seq network  (used for eval only, not training)
# Species: mouse  /  Genome: mm10
#
# Scoring adapter loaded from training run over hESC+hHep+mDC+mHSC-E+mHSC-GM.
# Set adapter_path to the artifact directory of the combined training run.
# ============================================================

run_id: mESC_infer
artifact_root: artifacts
seed: 42
eval_track: track1_no_literature
split_id: mESC_infer
disable_priors: false
use_ortholog_lookup: true

# ------------------------------------------------------------------
# Multimodal acquisition
# Run the command below once, then uncomment multimodal_manifest.
#
# conda run --live-stream -n om-agent python3 scripts/acquire_multimodal_data.py \
#   --expr        Data/sc-RNA-seq/mESC/ExpressionData.csv \
#   --species     mouse \
#   --genome      mm10 \
#   --cell-type   "embryonic stem cell" \
#   --lineage     "pluripotent" \
#   --cell-context \
#     "Mouse embryonic stem cells (mESC): scRNA-seq Beeline benchmark dataset; \
#      E14 mESC maintained in serum+LIF" \
#   --gold-network  Data/sc-RNA-seq/mESC/mESC-ChIP-seq-network.csv \
#   --out-manifest  artifacts/acquire/mESC/multimodal_manifest.json \
#   --strict \
#   --jaspar-release 2026 \
#   --use-semantic-slm
#
# multimodal_manifest: artifacts/acquire/mESC/multimodal_manifest.json
# ------------------------------------------------------------------

dataset:
  mode: beeline_csv
  dataset_id: mESC
  species: mouse
  expression_path: Data/sc-RNA-seq/mESC/ExpressionData.csv
  gold_edges_path: Data/sc-RNA-seq/mESC/mESC-ChIP-seq-network.csv
  tf_file: Data/sc-RNA-seq/mESC/TFs.csv
  modalities: ["scrna"]

cell_context:
  use_scanpy: false
  cell_type: "embryonic stem cell"

candidates:
  min_pearson: 0.1
  max_edges_per_tf: 50

train:
  frac: 0.0  # no training — inference only

calibration:
  temperature: 1.0

decode:
  max_regulators_per_target: 10
  min_confidence: 0.0

scoring:
  checkpoint: artifacts/eager/eager.pt
  device: cpu
