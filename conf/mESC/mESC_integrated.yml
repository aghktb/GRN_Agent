workflow:
  id: mESC_integrated
  seed: 42
  artifact_root: artifacts
  inference_evaluation_only: true

acquisition:
  enabled: false
  reuse_if_exists: true
  expr: Data/sc-RNA-seq/mESC/ExpressionData.csv
  species: mouse
  cell_type: embryonic stem cell
  cell_line: ES-E14
  gold_network: Data/sc-RNA-seq/mESC/mESC-ChIP-seq-network.csv
  out_manifest: artifacts/acquire/mESC/multimodal_manifest.json

pipeline_phase1:
  enabled: false
  reuse_if_exists: true
  config: conf/mESC/mESC_e2e_om.yml
  run_id: mESC_phase1
  stop_after: evidence_graphs
  candidates:
    corr_threshold: 0.2
    topk_corr: 2000
    topk_prior: 1000
    rescue_max_per_tf: 1000
    max_edges_per_tf: 500
    rescue_motif: true
    rescue_accessibility: true
    rescue_prior: true

split:
  enabled: false
  gold_edges: Data/sc-RNA-seq/mESC/mESC-ChIP-seq-network.csv
  out: conf/mESC/mESC_split_manifest.csv
  fold_id: mESC_f1
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2

build_pairs:
  enabled: false
  out_prefix: artifacts/mESC/holdout/train
  gold_edges: Data/sc-RNA-seq/mESC/mESC-ChIP-seq-network.csv
  strategy: leave_one_tf_out
  fold_id: mESC_f1
  subset: train
  negative_ratio: 5

train_eager:
  enabled: false
  out: artifacts/mESC/holdout/train/eager.pt
  epochs: 100
  lr: 0.001
  val_frac: 0.1
  early_stopping_patience: 10
  early_stopping_min_delta: 0.0001
  modality_dropout: 0.0
  device: cuda
  wandb: true
  wandb_project: grn-agent-eager
  wandb_run_name: mESC_integrated_train

inference_phase2:
  enabled: true # TODO: change to false
  config: conf/mESC/mESC_e2e_om_infer.yml
  run_id: mESC_integrated_infer
  device: cuda
  candidates:
    mode: tf_neighborhood
    corr_threshold: 0.2
    topk_corr: 2000
    topk_prior: 1000
    rescue_max_per_tf: 1000
    max_edges_per_tf: 500
    rescue_motif: true
    rescue_accessibility: true
    rescue_prior: true
  inference_filter:
    subset: test
    target_universe: all_genes

evaluation:
  enabled: true
  evaluate_all_scores: true
  gold_edges: Data/sc-RNA-seq/mESC/mESC-ChIP-seq-network.csv
  strategy: leave_one_tf_out
  fold_id: mESC_f1
  subset: test
  negative_ratios: "1,2,5,10"
  out_report: artifacts/mESC/integrated_infer/eval_test_by_ratio.json
  wandb: true
  wandb_project: grn-agent-eager
  wandb_run_name: mESC_integrated_eval
