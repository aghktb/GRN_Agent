run_id: mESC_e2e_om_infer
artifact_root: artifacts
seed: 42
eval_track: track1_no_literature
split_id: mESC
disable_priors: true
use_ortholog_lookup: false
dataset:
  mode: beeline_csv
  dataset_id: mESC
  species: mouse
  expression_path: Data/sc-RNA-seq/mESC/ExpressionData.csv
  tf_file: Data/sc-RNA-seq/mESC/TFs.csv
  modalities:
  - scrna
cell_context:
  use_scanpy: false
  cell_type: embryonic stem cell
candidates:
  mode: tf_neighborhood
  corr_threshold: 0.1
  topk_corr: 200
  topk_prior: 100
  rescue_motif: true
  rescue_accessibility: true
  rescue_prior: true
  rescue_max_per_tf: 100
  max_edges_per_tf: 50
train:
  frac: 0.8
calibration:
  temperature: 1.0
decode:
  max_regulators_per_target: 10
  min_confidence: 0.0
scoring:
  checkpoint: artifacts/mESC_e2e_om/train/eager.pt
  device: cuda
wandb:
  enabled: true
  project: grn-agent-eager
  run_name: mESC_infer
multimodal_manifest: artifacts/acquire/mESC/multimodal_manifest.json
